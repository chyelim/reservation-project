<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>예약</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5" style="font-size:20px;">
<form action="/my" method="get">
  <input name="phone" placeholder="전화번호" class="form-control mb-2">
  <button class="btn btn-info w-100">내 예약 조회</button>
</form>
<h2>예약하기</h2>

<form action="/reserve" method="post">

  <!-- 예약자 -->
  <div class="mb-3">
    <label class="form-label">예약자명 (필수)</label>
    <input type="text" name="reserver_name" class="form-control" required>
  </div>

  <div class="mb-3">
    <label class="form-label">전화번호</label>
    <input type="text" name="reserver_contact" class="form-control">
  </div>

  <div class="mb-3">
    <label class="form-label">날짜</label>
    <input type="date" name="date" class="form-control" required>
  </div>

  <!-- 참석자 수 -->
  <div class="mb-3">
    <label class="form-label">참석자 수</label>
    <input type="number" id="party_size" name="party_size"
           min="1" max="14" value="1"
           class="form-control" required>
  </div>

  <!-- 참석자 입력 영역 -->
  <div id="attendees_container" class="mb-3"></div>

  <button type="submit" class="btn btn-primary btn-lg w-100">예약하기</button>

</form>

<hr>

<a href="/status" class="btn btn-success w-100">예약 현황 보기</a>
<a href="/admin" class="btn btn-dark w-100 mt-2">관리자 로그인</a>

<!-- 🔥 핵심 JS -->
<script>
function renderAttendees(n) {
  const container = document.getElementById('attendees_container');
  container.innerHTML = '';

  for (let i = 0; i < n; i++) {
    const idx = i + 1;

    const html = `
      <div class="card mb-2 p-2">
        <div><strong>참석자 ${idx}</strong></div>
        <input type="text"
               name="attendee_name"
               placeholder="이름"
               class="form-control mb-1"
               ${i === 0 ? 'required' : ''}>

        <input type="text"
               name="attendee_contact"
               placeholder="연락처"
               class="form-control">
      </div>
    `;

    container.insertAdjacentHTML('beforeend', html);
  }
}

// 초기 렌더링
document.addEventListener('DOMContentLoaded', function() {
  const partyInput = document.getElementById('party_size');

  renderAttendees(parseInt(partyInput.value || 1));

  partyInput.addEventListener('change', function() {
    let v = parseInt(this.value) || 1;

    if (v < 1) v = 1;
    if (v > 14) v = 14;

    this.value = v;

    renderAttendees(v);
  });
});
</script>
<div class="alert alert-info">
  ✔ 정원 초과 시 자동으로 <strong>대기</strong> 상태가 됩니다.
</div>
</body>
</html>
