<!DOCTYPE html>
<html>
<body class="container mt-5">

<h2>예약 결과</h2>

{% for status, order in rows %}
  {% if status == 'confirmed' %}
    <div class="alert alert-success">예약이 완료되었습니다.</div>
  {% elif status == 'waiting' %}
    <div class="alert alert-warning">
      대기 {{ order }}번입니다.
    </div>
  {% endif %}
{% endfor %}

<a href="/" class="btn btn-primary w-100">돌아가기</a>

</body>
</html>
